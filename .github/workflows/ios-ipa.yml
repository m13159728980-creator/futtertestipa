name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build-ios-ipa:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build iOS app without code signing
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -qry PrvChat-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrvChat-ios-unsigned
          path: app/build/ios/ipa/PrvChat-unsigned.ipa
          if-no-files-found: error
